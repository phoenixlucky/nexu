name: Desktop CI Dev

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'openclaw-runtime/**'
      - '.npmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/desktop-check-dev.sh'
      - 'scripts/desktop-check-dev.mjs'
      - 'scripts/desktop-ci-check.mjs'
      - 'tsconfig.base.json'
      - '.github/workflows/desktop-ci-dev.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'openclaw-runtime/**'
      - '.npmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/desktop-check-dev.sh'
      - 'scripts/desktop-check-dev.mjs'
      - 'scripts/desktop-ci-check.mjs'
      - 'tsconfig.base.json'
      - '.github/workflows/desktop-ci-dev.yml'

permissions:
  contents: read

concurrency:
  group: desktop-ci-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runs_on: macos-14
          - os: windows
            runs_on: windows-latest

    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tmux
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          brew install tmux

      - name: Show desktop toolchain versions
        shell: pwsh
        run: |
          pnpm exec electron --version
          if ("${{ matrix.os }}" -eq "macos") {
            tmux -V
          }

      - name: Verify desktop runtime unit health
        if: matrix.os == 'macos'
        env:
          NEXU_DESKTOP_CHECK_CAPTURE_DIR: ${{ runner.temp }}/desktop-ci
          NEXU_USE_LAUNCHD: "0"
        run: pnpm check:dev

      - name: Verify Windows desktop build pipeline
        if: matrix.os == 'windows'
        run: pnpm --filter @nexu/desktop build

      - name: Capture desktop logs
        if: always()
        shell: pwsh
        run: |
          $captureDir = Join-Path $env:RUNNER_TEMP "desktop-ci"
          New-Item -ItemType Directory -Force -Path $captureDir | Out-Null
          if (Test-Path ".tmp/logs") {
            Copy-Item ".tmp/logs" (Join-Path $captureDir "repo-logs") -Recurse -Force
          }
          if (Test-Path ".tmp/desktop/electron/logs") {
            Copy-Item ".tmp/desktop/electron/logs" (Join-Path $captureDir "electron-logs") -Recurse -Force
          }

      - name: Capture tmux log
        if: always() && matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/desktop-ci"
          if tmux has-session -t nexu-desktop 2>/dev/null; then
            tmux capture-pane -pt nexu-desktop -S -400 > "$RUNNER_TEMP/desktop-ci/tmux.log"
          fi

      - name: Upload desktop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ci-logs-${{ matrix.os }}
          path: ${{ runner.temp }}/desktop-ci
          if-no-files-found: warn
          retention-days: 7
