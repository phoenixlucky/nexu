name: Detect Agent-Generated PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  detect-agent-pr:
    name: Auto-label agent-assisted PRs
    runs-on: ubuntu-latest
    steps:
      - name: Detect AI agent signals
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            // Signal 1: PR body contains agent-assisted checkbox checked
            const bodyChecked =
              pr.body &&
              pr.body.includes("[x] This PR was generated or significantly assisted by an AI coding agent");

            // Signal 2: Branch name patterns from common AI agents
            const agentBranchPatterns = [
              /^cursor\//i,
              /^copilot\//i,
              /^claude\//i,
              /^codex\//i,
              /^devin\//i,
              /^sweep\//i,
              /^coderabbit\//i,
              /^aider\//i,
              /^cursor\/-bc-/,
            ];
            const branchMatch = agentBranchPatterns.some((p) =>
              p.test(pr.head.ref)
            );

            // Signal 3: Known bot/agent user accounts
            const agentUsers = [
              "dependabot[bot]",
              "renovate[bot]",
              "sweep-ai[bot]",
              "coderabbitai[bot]",
              "devin-ai[bot]",
            ];
            const isAgentUser = agentUsers.includes(pr.user.login);

            // Signal 4: Commit messages from agent tools
            let commitSignal = false;
            try {
              const { data: commits } = await github.rest.pulls.listCommits({
                owner,
                repo,
                pull_number: prNumber,
                per_page: 10,
              });

              const agentCommitPatterns = [
                /generated by cursor/i,
                /co-authored-by:.*\[bot\]/i,
                /\[codex\]/i,
                /\[copilot\]/i,
                /generated by ai/i,
                /aider/i,
              ];

              commitSignal = commits.some((c) =>
                agentCommitPatterns.some((p) => p.test(c.commit.message))
              );
            } catch (e) {
              core.warning(`Failed to check commits: ${e.message}`);
            }

            const isAgent = bodyChecked || branchMatch || isAgentUser || commitSignal;

            if (!isAgent) {
              core.info("No agent signals detected, skipping labeling.");
              return;
            }

            const signals = [];
            if (bodyChecked) signals.push("PR body checkbox");
            if (branchMatch) signals.push(`branch name (${pr.head.ref})`);
            if (isAgentUser) signals.push(`user account (${pr.user.login})`);
            if (commitSignal) signals.push("commit message pattern");

            core.info(
              `Agent PR detected via: ${signals.join(", ")}`
            );

            // Add label
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: ["agent-assisted"],
            });

            // Only comment on first open (not synchronize)
            if (context.payload.action === "opened") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: [
                  "🤖 This PR has been auto-labeled as **agent-assisted** (detected via: " +
                    signals.join(", ") +
                    ").",
                  "",
                  "**Reviewers:** Please pay extra attention to:",
                  "- Generated code quality and correctness",
                  "- No hallucinated imports or non-existent APIs",
                  "- Test coverage for new logic",
                  "- No credentials or secrets in generated code",
                  "",
                  "**PR author:** Please confirm you've reviewed the generated code and all checks pass.",
                ].join("\n"),
              });
            }
