name: Detect Agent-Generated PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  detect-agent-pr:
    name: Auto-label agent-assisted PRs
    runs-on: ubuntu-latest
    steps:
      - name: Detect AI agent signals and label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const signals = [];

            // Signal 1: PR body checkbox
            if (
              pr.body &&
              pr.body.includes(
                "[x] This PR was generated or significantly assisted by an AI coding agent"
              )
            ) {
              signals.push("PR body checkbox");
            }

            // Signal 2: Branch naming patterns
            const agentBranchPatterns = [
              /^cursor\//i,
              /^cursor\/-bc-/,
              /^copilot\//i,
              /^claude\//i,
              /^codex\//i,
              /^devin\//i,
              /^sweep\//i,
              /^coderabbit\//i,
              /^aider\//i,
            ];
            if (agentBranchPatterns.some((p) => p.test(pr.head.ref))) {
              signals.push(`branch pattern (${pr.head.ref})`);
            }

            // Signal 3: Known bot accounts
            const botUsers = [
              "dependabot[bot]",
              "renovate[bot]",
              "sweep-ai[bot]",
              "coderabbitai[bot]",
              "devin-ai[bot]",
            ];
            if (botUsers.includes(pr.user.login)) {
              signals.push(`bot account (${pr.user.login})`);
            }

            // Signal 4: Commit message patterns
            try {
              const { data: commits } = await github.rest.pulls.listCommits({
                owner, repo,
                pull_number: prNumber,
                per_page: 10,
              });

              const commitPatterns = [
                /generated by cursor/i,
                /co-authored-by:.*\[bot\]/i,
                /\[codex\]/i,
                /\[copilot\]/i,
                /generated by ai/i,
                /aider\//i,
              ];

              if (
                commits.some((c) =>
                  commitPatterns.some((p) => p.test(c.commit.message))
                )
              ) {
                signals.push("commit message pattern");
              }
            } catch (e) {
              core.warning(`Failed to check commits: ${e.message}`);
            }

            if (signals.length === 0) {
              core.info("No agent signals detected.");
              return;
            }

            core.info(`Agent PR detected via: ${signals.join(", ")}`);

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels: ["agent-assisted"],
            });

            // Only comment on open, not synchronize
            if (context.payload.action !== "opened") return;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: prNumber,
              body: [
                `🤖 Auto-labeled as **agent-assisted** (detected via: ${signals.join(", ")}).`,
                "",
                "**Reviewers** — extra attention on:",
                "- Hallucinated imports or non-existent APIs",
                "- Over-engineered abstractions",
                "- Missing error handling / edge cases",
                "- Credentials in generated code",
                "",
                "**Author** — please confirm you've reviewed the generated code and all CI checks pass.",
              ].join("\n"),
            });
