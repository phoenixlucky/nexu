# Feishu notifications for GitHub Projects v2 items.
#
# GitHub Actions does not support `projects_v2_item` as a direct workflow trigger.
# To keep this workflow valid, accept project item payloads through:
# - `repository_dispatch` with type `projects_v2_item`
# - `workflow_dispatch` for manual testing / replay
#
# For automatic delivery from GitHub Projects v2 webhooks, deploy
# `scripts/notify/github-project-webhook-bridge.mjs` behind an HTTPS endpoint and
# point the org/repo webhook at it.
#
# Expected `repository_dispatch.client_payload` fields:
# - action
# - changes
# - item_node_id
# - project_number
# - sender
# - org_or_user
name: Feishu Projects V2 Item Notify

on:
  repository_dispatch:
    types: [projects_v2_item]
  workflow_dispatch:
    inputs:
      action:
        description: "Project item action"
        required: false
        default: "edited"
        type: string
      changes_json:
        description: "JSON for github.event.changes"
        required: false
        default: "{}"
        type: string
      item_node_id:
        description: "Project item GraphQL node ID"
        required: false
        type: string
      project_number:
        description: "Projects v2 number"
        required: false
        type: string
      sender:
        description: "Actor login"
        required: false
        default: ""
        type: string
      org_or_user:
        description: "Project owner login"
        required: false
        default: ""
        type: string

jobs:
  notify:
    name: Notify Feishu on Project Item Change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/notify

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NEXU_PAL_APP_ID }}
          private-key: ${{ secrets.NEXU_PAL_PRIVATE_KEY_PEM }}

      - name: Send Feishu notification
        env:
          WEBHOOK_URL: ${{ secrets.ISSUE_SYNC_FEISHU_BOT_WEBHOOK }}
          ACTION: ${{ github.event.client_payload.action || inputs.action || 'edited' }}
          CHANGES_JSON: ${{ toJson(github.event.client_payload.changes || fromJson(inputs.changes_json || '{}')) }}
          ITEM_NODE_ID: ${{ github.event.client_payload.item_node_id || inputs.item_node_id || '' }}
          PROJECT_NUMBER: ${{ github.event.client_payload.project_number || inputs.project_number || '' }}
          SENDER: ${{ github.event.client_payload.sender || inputs.sender || github.actor }}
          ORG_OR_USER: ${{ github.event.client_payload.org_or_user || inputs.org_or_user || github.repository_owner }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/notify/feishu-project-notify.mjs
