name: Desktop CI Dist

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/desktop-check-dev.sh"
      - "scripts/desktop-check-dist.sh"
      - "scripts/desktop-check-dist.mjs"
      - "scripts/desktop-ci-check.mjs"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/shared/**"
      - "openclaw-runtime/**"
      - ".npmrc"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/desktop-check-dev.sh"
      - "scripts/desktop-check-dist.sh"
      - "scripts/desktop-check-dist.mjs"
      - "scripts/desktop-ci-check.mjs"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-ci-dist.yml"

permissions:
  contents: read

concurrency:
  group: desktop-ci-dist-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-14
            arch: arm64
          - os: macos
            runner: macos-15-intel
            arch: x64
          - os: windows
            runner: windows-latest
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show desktop toolchain versions
        shell: pwsh
        run: pnpm exec electron --version

      - name: Build unsigned desktop bundle
        env:
          NEXU_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
        run: ${{ matrix.os == 'windows' && 'pnpm --filter @nexu/desktop dist:win:unsigned' || 'pnpm dist:mac:unsigned' }}

      - name: Set packaged app paths
        shell: pwsh
        run: |
          $captureDir = Join-Path $env:RUNNER_TEMP "desktop-ci"
          $packagedHome = Join-Path $env:RUNNER_TEMP "desktop-home"
          $tmpDir = Join-Path $env:RUNNER_TEMP "desktop-tmp"
          New-Item -ItemType Directory -Force -Path $captureDir, $packagedHome, $tmpDir | Out-Null

          if ("${{ matrix.os }}" -eq "macos") {
            $packagedUserDataDir = Join-Path $packagedHome "Library/Application Support/@nexu/desktop"
            $packagedApp = "apps/desktop/release/mac-${{ matrix.arch }}/Nexu.app"
            $packagedExecutable = "$packagedApp/Contents/MacOS/Nexu"
          } else {
            $packagedUserDataDir = Join-Path $packagedHome "nexu-desktop"
            $packagedApp = "apps/desktop/release/win-unpacked"
            $packagedExecutable = "$packagedApp/Nexu.exe"
          }

          $packagedLogsDir = Join-Path $packagedUserDataDir "logs"
          $packagedRuntimeLogsDir = Join-Path $packagedLogsDir "runtime-units"

          @(
            "PACKAGED_HOME=$packagedHome",
            "PACKAGED_LOGS_DIR=$packagedLogsDir",
            "PACKAGED_USER_DATA_DIR=$packagedUserDataDir",
            "PACKAGED_RUNTIME_LOGS_DIR=$packagedRuntimeLogsDir",
            "DEFAULT_LOGS_DIR=$packagedLogsDir",
            "DEFAULT_USER_DATA_DIR=$packagedUserDataDir",
            "DEFAULT_RUNTIME_LOGS_DIR=$packagedRuntimeLogsDir",
            "PACKAGED_APP=$packagedApp",
            "PACKAGED_EXECUTABLE=$packagedExecutable"
          ) | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify packaged desktop artifacts
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -eq "macos") {
            $dmgArtifacts = Get-ChildItem "apps/desktop/release/*.dmg" -ErrorAction SilentlyContinue
            $zipArtifacts = Get-ChildItem "apps/desktop/release/*.zip" -ErrorAction SilentlyContinue
            if (-not $dmgArtifacts) { throw "No desktop DMG artifact was produced" }
            if (-not $zipArtifacts) { throw "No desktop ZIP artifact was produced" }
            $dmgArtifacts | ForEach-Object { "Built artifact: $($_.FullName)" }
            $zipArtifacts | ForEach-Object { "Built artifact: $($_.FullName)" }
          }

          if (-not (Test-Path $env:PACKAGED_APP)) { throw "Packaged app path missing: $env:PACKAGED_APP" }
          if (-not (Test-Path $env:PACKAGED_EXECUTABLE)) { throw "Packaged executable missing: $env:PACKAGED_EXECUTABLE" }

      - name: Upload desktop build artifacts
        if: success() && matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ci-dist-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error
          retention-days: 3

      - name: Verify packaged runtime unit health
        if: matrix.os == 'macos'
        env:
          NEXU_DESKTOP_CHECK_CAPTURE_DIR: ${{ runner.temp }}/desktop-ci
          NEXU_DESKTOP_CHECK_TMPDIR: ${{ runner.temp }}/desktop-tmp
        run: pnpm check:dist

      - name: Capture desktop logs
        if: always()
        shell: pwsh
        run: |
          $captureDir = Join-Path $env:RUNNER_TEMP "desktop-ci"
          New-Item -ItemType Directory -Force -Path $captureDir | Out-Null
          if ($env:PACKAGED_LOGS_DIR -and (Test-Path $env:PACKAGED_LOGS_DIR)) {
            Copy-Item $env:PACKAGED_LOGS_DIR (Join-Path $captureDir "packaged-logs") -Recurse -Force
          }
          if ($env:PACKAGED_RUNTIME_LOGS_DIR -and (Test-Path $env:PACKAGED_RUNTIME_LOGS_DIR)) {
            Copy-Item $env:PACKAGED_RUNTIME_LOGS_DIR (Join-Path $captureDir "runtime-unit-logs") -Recurse -Force
          }
          if ($env:DEFAULT_LOGS_DIR -and (Test-Path $env:DEFAULT_LOGS_DIR)) {
            Copy-Item $env:DEFAULT_LOGS_DIR (Join-Path $captureDir "default-logs") -Recurse -Force
          }
          if ($env:DEFAULT_RUNTIME_LOGS_DIR -and (Test-Path $env:DEFAULT_RUNTIME_LOGS_DIR)) {
            Copy-Item $env:DEFAULT_RUNTIME_LOGS_DIR (Join-Path $captureDir "default-runtime-unit-logs") -Recurse -Force
          }

      - name: Upload desktop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-ci-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/desktop-ci
          if-no-files-found: warn
          retention-days: 3
